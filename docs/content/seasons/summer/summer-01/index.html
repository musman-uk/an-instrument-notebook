<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Warm Hours</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Handwritten font -->
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 2.5rem;
      font-family: ui-serif, Georgia, serif;
      background: #faf9f6;
      color: #333;
      line-height: 1.6;
    }

    header {
      position: relative;
      margin-bottom: 3rem;
    }

    h1 {
      margin: 0;
      font-size: 2.4rem;
      letter-spacing: 0.5px;
    }

    /* About link — homepage only */
    .about-link {
      position: absolute;
      top: 0;
      right: 0;
      font-size: 0.9rem;
      text-decoration: none;
      color: #666;
      padding: 0.2rem 0.4rem;
      border-left: 2px solid #ddd;
      opacity: 0.8;
    }

    .about-link:hover {
      opacity: 1;
      text-decoration: underline;
    }

    /* Sticky-note style cards */
    .season-card {
      padding: 1.2rem;
      background: #fffdf8;
      border-left: 4px solid #ccc;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
      transform: rotate(-0.4deg);
      transition: transform 0.15s ease;
    }

    .season-card:hover {
      transform: rotate(-0.4deg) translateY(-3px);
    }

    /* Handwritten text */
    .note-body {
      font-family: 'Caveat', cursive;
      font-size: 1.4rem;
      line-height: 1.5;
      letter-spacing: 0.3px;
    }

    /* Homepage grid */
    .season-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .season-card h2 {
      margin-top: 0;
      font-size: 1.4rem;
    }
  </style>
</head>

<body>
  <header>
    <h1>Seasonal Notes</h1>

    
    
  </header>

  <main>
    
<div class="season-card" style="border-color: #F4D06F; max-width: 520px;">
  <h2>Warm Hours</h2>

  <div class="note-body">
    <p>Some days stretch so gently that time feels unhurried,<br>
as if the sun is holding everything in place.</p>

  </div>
</div>

  </main>
</body>
</html>
