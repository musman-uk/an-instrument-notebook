<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Instrumental Notes</title>

  <style>
    :root {
      --coral: #FF6F61;
      --lavender: #B3AEDF;
    }

    body {
      margin: 0;
      padding: 2rem 1.5rem;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,111,97,0.25), transparent 65%),
        radial-gradient(circle at 80% 70%, rgba(122,95,255,0.25), transparent 65%),
        linear-gradient(160deg, #05070D, #0A0F1F, #1C2541);
      color: var(--lavender);
      font-family: "Cormorant Garamond", serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Musical notes — EXACTLY like Prelude */
    .note-cluster {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 1rem;
      justify-content: center;
    }

    .note {
      font-size: 1.35rem;
      color: var(--lavender);
      text-shadow: 0 0 12px rgba(199,196,226,0.7);
      line-height: 1;
    }

    /* Top bar — Prelude link fixed top-right across devices */
    .top-bar {
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 20;

      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .prelude-link {
      text-decoration: none;
      color: var(--coral);
      padding: 0.45rem 1rem;
      border-radius: 4px;
      background: rgba(255,111,97,0.12);
      border: 1px solid rgba(255,111,97,0.45);
      box-shadow: 0 0 10px rgba(255,111,97,0.55);
      font-size: 0.95rem;
      letter-spacing: 0.6px;
      backdrop-filter: blur(4px);
      transition: background 0.25s ease, box-shadow 0.25s ease, transform 0.2s ease;
    }

    .prelude-link:hover {
      background: rgba(255,111,97,0.25);
      box-shadow: 0 0 16px rgba(255,111,97,0.75);
      transform: translateY(-2px);
    }

    /* Title */
    .title {
      font-size: 2.8rem;
      letter-spacing: 1px;
      color: var(--coral);
      text-shadow: 0 0 18px rgba(255,111,97,0.85);
      margin-top: 4.5rem; /* spacing to compensate for fixed top bar */
      margin-bottom: 2.5rem;
      text-align: center;
    }

    /* Instrument sections */
    .studio-sections {
      max-width: 700px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    /* CONTENT NOTES — blackish sound panel + coral glow */
    .studio-card {
      padding: 1.4rem 1.2rem;

      /* blackish-blue sound panel */
      background: rgba(10, 15, 30, 0.55);
      border: 1px solid rgba(255,111,97,0.25);
      border-radius: 6px;
      backdrop-filter: blur(4px);

      /* coral glow */
      box-shadow: 0 0 18px rgba(255,111,97,0.18);

      text-decoration: none;
      color: var(--lavender);
      text-shadow: 0 0 6px rgba(199,196,226,0.25);
    }

    .studio-title {
      font-size: 1.4rem;
      margin-bottom: 0.2rem;
      color: var(--coral);
      text-shadow: 0 0 12px rgba(255,111,97,0.55);
    }

    .studio-desc {
      font-size: 0.9rem;
      opacity: 0.9;
      color: var(--lavender);
      text-shadow: 0 0 6px rgba(199,196,226,0.25);
    }
  </style>
</head>

<body>

  <!-- Musical notes — centered like Prelude -->
  <div class="note-cluster">
    <div class="note">♫</div>
    <div class="note">♪</div>
    <div class="note">♫</div>
  </div>

  <div class="top-bar">
    <a class="prelude-link" href="/prelude/">Prelude</a>
  </div>

  <div class="title">Instrumental Notes</div>

  <div class="studio-sections">

    
      <div class="studio-card">
        <div class="studio-title">🎸 Acoustic Guitar</div>
        <div class="studio-desc">A warm, resonant instrument shaped by wood, tension, and touch.</div>
      </div>
    
      <div class="studio-card">
        <div class="studio-title">🥁 Drums</div>
        <div class="studio-desc">The heartbeat of rhythm, found in every culture.</div>
      </div>
    

  </div>

</body>
</html>
