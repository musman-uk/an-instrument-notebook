<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Instrumental Notes</title>

  <style>
    body {
      margin: 0;
      padding: 2rem 1.5rem;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,111,97,0.35), transparent 65%),
        radial-gradient(circle at 80% 70%, rgba(201,75,123,0.35), transparent 65%),
        radial-gradient(circle at 50% 10%, rgba(122,95,255,0.25), transparent 70%),
        linear-gradient(160deg, #05070D, #0A0F1F, #1C2541);
      color: #F2C6B4;
      font-family: "Cormorant Garamond", serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Top-left musical arpeggio */
    .note-cluster {
      position: fixed;
      top: 1.2rem;
      left: 1.2rem;
      display: flex;
      flex-direction: row;
      gap: 0.35rem;
      pointer-events: none;
    }

    .note {
      font-size: 1.35rem;
      color: #FF6F61;
      text-shadow: 0 0 12px rgba(255,111,97,0.7);
      line-height: 1;
    }

    /* Top bar containing Prelude */
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 2rem;
    }

    /* Prelude link with neon coral glow */
    .prelude-link {
      text-decoration: none;
      color: #FF6F61;
      padding: 0.45rem 1rem;
      border-radius: 4px;
      background: rgba(255,111,97,0.12);
      border: 1px solid rgba(255,111,97,0.45);
      box-shadow: 0 0 10px rgba(255,111,97,0.55);
      font-size: 0.95rem;
      letter-spacing: 0.6px;
      backdrop-filter: blur(4px);
      transition: background 0.25s ease, box-shadow 0.25s ease, transform 0.2s ease;
    }

    .prelude-link:hover {
      background: rgba(255,111,97,0.25);
      box-shadow: 0 0 16px rgba(255,111,97,0.75);
      transform: translateY(-2px);
    }

    /* Title */
    .title {
      font-size: 2.8rem;
      letter-spacing: 1px;
      color: #FF6F61;
      text-shadow: 0 0 16px rgba(255,111,97,0.75);
      margin-bottom: 2.5rem;
      text-align: center;
    }

    /* Instrument sections */
    .studio-sections {
      max-width: 700px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    .studio-card {
      padding: 1.4rem 1.2rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      text-decoration: none;
      color: #F2C6B4;
      backdrop-filter: blur(3px);
      text-shadow: 0 0 6px rgba(242,198,180,0.25);
      /* hover removed — cards remain still */
    }

    .studio-title {
      font-size: 1.4rem;
      margin-bottom: 0.2rem;
      color: #F2C6B4;
      text-shadow: 0 0 8px rgba(242,198,180,0.35);
    }

    .studio-desc {
      font-size: 0.9rem;
      opacity: 0.85;
      color: #F2C6B4;
      text-shadow: 0 0 6px rgba(242,198,180,0.25);
    }
  </style>
</head>

<body>

  <!-- Musical arpeggio in top-left -->
  <div class="note-cluster">
    <div class="note">♫</div>
    <div class="note">♪</div>
    <div class="note">♫</div>
  </div>

  <div class="top-bar">
    <a class="prelude-link" href="/prelude/">Prelude</a>
  </div>

  <div class="title">Instrumental Notes</div>

  <div class="studio-sections">

    

  </div>

</body>
</html>
